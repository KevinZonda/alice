# Feishu app credentials (required)
feishu_app_id: "cli_xxxxx"
feishu_app_secret: "xxxxxx"

# Optional, default is https://open.feishu.cn
feishu_base_url: "https://open.feishu.cn"
# Optional but recommended for group chats: strict bot mention filtering
# If both are empty, all group/topic-group messages are ignored.
feishu_bot_open_id: ""
feishu_bot_user_id: ""
# Group trigger mode:
# - at: only process group/topic-group messages that @bot (default)
# - active: process all group/topic-group messages, except messages starting with trigger_prefix
# - prefix: only process group/topic-group messages starting with trigger_prefix
trigger_mode: "at"
# Prefix used by trigger_mode:
# - active: ignore messages starting with this prefix
# - prefix: only process messages starting with this prefix, and strip prefix before LLM input
trigger_prefix: ""

# LLM runtime (supported providers: codex, claude, kimi)
llm_provider: "codex"
codex_command: "codex"
codex_timeout_secs: 172800
claude_command: "claude"
claude_timeout_secs: 120
kimi_command: "kimi"
kimi_timeout_secs: 120
# Automatically register MCP server into the selected LLM CLI at startup.
codex_mcp_auto_register: true
# If true, startup fails when MCP registration fails.
codex_mcp_register_strict: false
# MCP server name used in `codex mcp` / `claude mcp` commands.
codex_mcp_server_name: "alice-feishu"
workspace_dir: "."
# Optional: environment variables passed to LLM process (proxy, etc.)
env:
  HTTPS_PROXY: "http://127.0.0.1:7890"
  ALL_PROXY: "socks5://127.0.0.1:7891"
# Memory directory (long-term MEMORY.md + short-term YYYY-MM-DD.md)
memory_dir: ".memory"

# Prompt and fallback
# Optional, default is empty. Set this only if you want a global instruction prefix.
codex_prompt_prefix: ""
claude_prompt_prefix: ""
kimi_prompt_prefix: ""
failure_message: "Codex 暂时不可用，请稍后重试。"
thinking_message: "正在思考中..."
# Immediate feedback after receiving a reply-style message:
# - reply: send an explicit `收到！` reply
# - reaction: add a message reaction first, then fallback to `收到！` if reaction fails
immediate_feedback_mode: "reply"
# Feishu reaction type when immediate_feedback_mode is reaction.
immediate_feedback_reaction: "SMILE"

# Queue and worker
queue_capacity: 256
worker_concurrency: 1
# Timeout (seconds) for one automation user task execution (run_llm/send_text)
automation_task_timeout_secs: 600
idle_summary_hours: 8
# Group context cache window (minutes) for non-@ group messages.
# On @ trigger, text + media from this window are merged into context.
group_context_window_minutes: 5

# debug | info | warn | error
log_level: "info"
# Optional rotating log file. Empty means stderr only.
log_file: ""
log_max_size_mb: 20
log_max_backups: 5
log_max_age_days: 7
log_compress: false
