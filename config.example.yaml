# Alice now uses a pure multi-bot config model.
# There is no root single-bot compatibility layer anymore.
# Each bot owns its own credentials, runtime state, workspace and CODEX_HOME.
#
# Default bot directories:
# - alice_home:   <ALICE_HOME>/bots/<bot_id>
# - workspace:    <alice_home>/workspace
# - prompts:      <alice_home>/prompts
# - codex_home:   <alice_home>/.codex
# - soul_path:    <workspace>/SOUL.md
# Missing SOUL.md files are created from the embedded SOUL.md.example on startup.
#
# Process-level base home is still controlled by:
# - CLI flag: `alice --alice-home /path/to/home`
# - env var: `ALICE_HOME=/path/to/home`

bots:
  chat_bot:
    name: "Alice Chat"
    feishu_app_id: "cli_chat_xxxxx"
    feishu_app_secret: "chat_secret"
    # Optional but recommended for group chats: strict bot mention filtering.
    feishu_bot_open_id: ""
    feishu_bot_user_id: ""

    # Optional runtime directories. Empty means use defaults under <ALICE_HOME>/bots/chat_bot.
    alice_home: ""
    workspace_dir: ""
    prompt_dir: ""
    codex_home: ""
    # If the file does not exist yet, Alice writes the embedded SOUL.md.example here on startup.
    soul_path: "SOUL.md"

    # Group work-scene trigger mode:
    # - at: only messages that @bot can enter / continue a work session (default)
    # - prefix: only messages starting with trigger_prefix can enter / continue a work session
    trigger_mode: "at"
    trigger_prefix: ""

    codex_command: "codex"
    codex_timeout_secs: 172800
    # Optional. Empty means inherit Codex CLI default model from ~/.codex/config.toml.
    codex_model: ""
    # Optional. Empty means inherit Codex CLI default reasoning effort.
    codex_model_reasoning_effort: ""
    claude_command: "claude"
    claude_timeout_secs: 172800
    gemini_command: "gemini"
    gemini_timeout_secs: 172800
    kimi_command: "kimi"
    kimi_timeout_secs: 172800

    # Optional named LLM profiles for scene routing.
    # Use these to select different models, reasoning effort, personalities or
    # provider-side profiles in different scenes.
    # chat / work can use different providers. If provider is omitted on a
    # profile, Alice falls back to the inferred/default provider.
    llm_profiles:
      chat:
        provider: "codex"
        model: "gpt-5.4-mini"
        profile: ""
        reasoning_effort: "low"
        personality: "friendly"

    # Optional: environment variables passed to LLM subprocesses.
    env:
      # If Alice is launched outside an nvm-initialized shell, ensure PATH points
      # to a Node >= 20 installation so `gemini` resolves the correct runtime.
      PATH: "/home/you/.nvm/versions/node/v24.14.0/bin:/usr/local/bin:/usr/bin:/bin"
      HTTPS_PROXY: "http://127.0.0.1:8080"
      ALL_PROXY: "http://127.0.0.1:8080"
      OPENAI_API_KEY: ""
      # Dedicated OpenAI image proxy envs. These only affect image_generation
      # and do not affect the Feishu sender chain.
      OPENAI_HTTPS_PROXY: "http://127.0.0.1:7890"
      OPENAI_NO_PROXY: "open.feishu.cn"

    # Prompt and fallback
    codex_prompt_prefix: ""
    claude_prompt_prefix: ""
    gemini_prompt_prefix: ""
    kimi_prompt_prefix: ""
    failure_message: "Codex 暂时不可用，请稍后重试。"
    thinking_message: "正在思考中..."

    # Optional roleplay image generation. This runs inside Alice after a text
    # reply is produced. Proxy for this client must come from env.OPENAI_*_PROXY
    # and still does not affect Feishu traffic.
    image_generation:
      enabled: false
      provider: "openai"
      # model:
      #   edit: gpt-image-1.5 | gpt-image-1 | gpt-image-1-mini | chatgpt-image-latest
      #   generate: gpt-image-1.5 | gpt-image-1 | gpt-image-1-mini | dall-e-2 | dall-e-3
      model: "gpt-image-1.5"
      base_url: ""
      timeout_secs: 120
      # moderation:
      #   edit / generate (GPT image models only): auto | low
      moderation: ""
      # n:
      #   edit / generate: 1..10
      #   generate with dall-e-3: only 1
      n: 0
      # output_compression:
      #   edit / generate: 0..100
      #   only for jpeg / webp output on GPT image models; -1 means unset
      output_compression: -1
      # response_format:
      #   generate: url | b64_json
      #   only for dall-e-2 / dall-e-3; GPT image models always return base64
      response_format: ""
      # size:
      #   edit: auto | 1024x1024 | 1536x1024 | 1024x1536
      #   generate (gpt-image-*): auto | 1024x1024 | 1536x1024 | 1024x1536
      #   generate (dall-e-2): 256x256 | 512x512 | 1024x1024
      #   generate (dall-e-3): 1024x1024 | 1792x1024 | 1024x1792
      size: "1024x1536"
      # quality:
      #   edit: auto | low | medium | high
      #   generate (gpt-image-*): auto | low | medium | high
      #   generate (dall-e-3): auto | standard | hd
      #   generate (dall-e-2): standard
      quality: "high"
      # background:
      #   edit / generate (GPT image models only): auto | opaque | transparent
      background: "auto"
      # output_format:
      #   edit / generate (GPT image models only): png | jpeg | webp
      output_format: "png"
      # partial_images:
      #   edit / generate with stream=true: 0..3; -1 means unset
      partial_images: -1
      # stream:
      #   edit / generate (GPT image models only): true | false
      stream: false
      # style:
      #   generate (dall-e-3 only): vivid | natural
      style: ""
      # input_fidelity:
      #   edit only: low | high
      #   supported by gpt-image-1 / gpt-image-1.5 and later, not gpt-image-1-mini
      input_fidelity: "high"
      # mask_path:
      #   edit only: local PNG mask path; transparent area means "editable"
      #   leave empty to disable
      mask_path: ""
      use_current_attachments: true

    # Immediate feedback after receiving a reply-style message:
    # - reply: send an explicit `收到！` reply
    # - reaction: add a message reaction first, then fallback to `收到！` if reaction fails
    immediate_feedback_mode: "reaction"
    immediate_feedback_reaction: "OK"

    # Scene router for group/topic-group chats.
    group_scenes:
      chat:
        enabled: true
        session_scope: "per_chat"
        llm_profile: "chat"
        no_reply_token: "[[NO_REPLY]]"
        create_feishu_thread: false
      work:
        enabled: false

    # Runtime and Codex permissions for this bot.
    # chat scene defaults to workspace-write; work scene defaults to danger-full-access.
    permissions:
      runtime_message: true
      runtime_automation: false
      runtime_campaigns: false
      allowed_skills: ["alice-message"]
      codex:
        chat:
          sandbox: "workspace-write"
          ask_for_approval: "never"
          add_dirs: []
        work:
          sandbox: "danger-full-access"
          ask_for_approval: "never"
          add_dirs: []

    queue_capacity: 256
    worker_concurrency: 3
    automation_task_timeout_secs: 6000

  work_bot:
    name: "Alice Work"
    feishu_app_id: "cli_work_xxxxx"
    feishu_app_secret: "work_secret"
    # If the file does not exist yet, Alice writes the embedded SOUL.md.example here on startup.
    soul_path: "SOUL.md"
    llm_profiles:
      chat:
        provider: "codex"
        model: "gpt-5.4-mini"
        reasoning_effort: "low"
        personality: "friendly"
      work:
        provider: "claude"
        model: "claude-sonnet-4-20250514"
        reasoning_effort: "high"
        personality: "pragmatic"
    group_scenes:
      chat:
        enabled: true
        session_scope: "per_chat"
        llm_profile: "chat"
      work:
        enabled: true
        trigger_tag: "#work"
        session_scope: "per_thread"
        llm_profile: "work"
    permissions:
      runtime_message: true
      runtime_automation: true
      runtime_campaigns: true
      allowed_skills: ["alice-message", "alice-scheduler", "alice-code-army"]
      codex:
        chat:
          sandbox: "workspace-write"
          ask_for_approval: "never"
        work:
          sandbox: "danger-full-access"
          ask_for_approval: "never"

# debug | info | warn | error
log_level: "info"
# Optional rotating log file. Empty means auto default: <ALICE_HOME>/log/YYYY-MM-DD.log
log_file: ""
log_max_size_mb: 20
log_max_backups: 5
log_max_age_days: 7
log_compress: false
