interface:
  display_name: "Alice 代码军队"
  short_description: "编排 GitLab 可见的 issue / MR / trial 优化闭环"
  default_prompt: "使用 $alice-code-army 在当前 Alice 会话里组织一个 GitLab 可见的 issue / MR 多 trial 优化流程，缺少 issue / MR 时先补齐；尽可能利用所有允许且可用的资源并行推进，提高效率；对 heartbeat/reconcile 类任务，若有清晰且安全的下一步就直接动手，并在必要时实际调整，而不是只巡检不动作；如果自己做不到或继续做不安全，必须调用 `/alice needs-human ...`，并在最终回复里追加 `<alice_command>/alice needs-human ...</alice_command>` 让 runtime 暂停自动任务并发送警告卡；对绑定 issue 的工作维护 GitLab 工时统计，优先使用 `scripts/alice-code-army.sh time-estimate` / `time-spend` 直接走 GitLab time-tracking API，而不是把 `/estimate` / `/spend` 混在普通评论里；最后说明如何打断、比较、收敛和记录踩坑。"
