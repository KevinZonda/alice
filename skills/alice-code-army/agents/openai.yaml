interface:
  display_name: "Alice 代码军队"
  short_description: "以 campaign 仓库为主事实源，编排多阶段、多任务、多 repo 协作"
  default_prompt: "使用 $alice-code-army 在当前 Alice 会话里组织一个 repo-first 的 campaign 协作流程：优先创建或复用 campaign repo，把计划、阶段、任务、评审、报告都沉淀到 campaign repo 的 markdown/frontmatter 结构里；采用 Alice orchestrator + Codex executor + Claude reviewer 的角色边界，默认 executor 负责做 task、reviewer 只写 review 文件、Alice judge 应用 review verdict；计划阶段请先通过交互式会话和 repo 文件产出 proposal、合并 master plan、等待人工批准，再把 ready 子任务交给 runtime 自动执行；按依赖和 write scope 控制并行，长任务通过 scheduler 自动唤醒；Alice backend 会自动 reconcile campaign repo、刷新 live report、派发 executor/reviewer workflow，并同步 wake task；需要对人可见时再把摘要镜像到 GitLab issue / MR，但不要把 issue 当成主存储；最后说明当前 campaign repo、活跃 tasks、review queue、阻塞项、下一步，以及 live report / phase report / paper 的更新情况。"
