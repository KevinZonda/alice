name: Docs Publish

on:
  push:
    branches: [dev, main]
    paths:
      - 'book/**'
      - '.github/workflows/docs-publish.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mdBook
        run: |
          curl -fsSL https://github.com/rust-lang/mdBook/releases/download/v0.4.44/mdbook-v0.4.44-x86_64-unknown-linux-gnu.tar.gz | tar xz -C /usr/local/bin

      - name: Build English book
        run: mdbook build book/en --dest-dir ../../out/en

      - name: Build Chinese book
        run: mdbook build book/zh --dest-dir ../../out/zh

      - name: Copy landing page
        run: cp book/landing.html book/lang-switcher.js out/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
