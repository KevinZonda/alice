name: Main Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  verify-and-tag:
    name: Verify Main Merge And Tag
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.next_tag.outputs.value }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep

      - name: Fetch Dev Branch
        run: git fetch --no-tags origin dev:refs/remotes/origin/dev

      - name: Enforce Main Merge Policy
        run: |
          set -euo pipefail
          parents="$(git show -s --format=%P HEAD)"
          parent_count="$(wc -w <<<"$parents" | tr -d ' ')"
          if [[ "$parent_count" -lt 2 ]]; then
            echo "main only accepts merge commits from dev." >&2
            echo "direct push is not allowed." >&2
            exit 1
          fi
          second_parent="$(awk '{print $2}' <<<"$parents")"
          if [[ -z "$second_parent" ]]; then
            echo "main merge commit does not include dev parent." >&2
            exit 1
          fi
          if ! git merge-base --is-ancestor "$second_parent" "origin/dev"; then
            echo "main merge must come from dev branch." >&2
            exit 1
          fi

      - name: Run Quality Gate
        run: make check

      - name: Compute Next Tag
        id: next_tag
        run: |
          set -euo pipefail
          latest_tag="$(git tag -l 'v*' --sort=-version:refname | head -n1)"
          if [[ -z "$latest_tag" ]]; then
            next_tag="v0.1.0"
          else
            if [[ ! "$latest_tag" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
              echo "latest tag is not semver: $latest_tag" >&2
              exit 1
            fi
            major="${BASH_REMATCH[1]}"
            minor="${BASH_REMATCH[2]}"
            patch="${BASH_REMATCH[3]}"
            next_tag="v${major}.${minor}.$((patch + 1))"
          fi
          echo "value=$next_tag" >> "$GITHUB_OUTPUT"
          echo "next release tag: $next_tag"

      - name: Create And Push Tag
        run: |
          set -euo pipefail
          tag="${{ steps.next_tag.outputs.value }}"
          if git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
            echo "tag already exists: $tag" >&2
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$tag"
          git push origin "$tag"

  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    needs: verify-and-tag
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            archive: tar.gz
          - goos: linux
            goarch: arm64
            archive: tar.gz
          - goos: darwin
            goarch: amd64
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            archive: tar.gz
          - goos: windows
            goarch: amd64
            archive: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build Binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail
          VERSION="${{ needs.verify-and-tag.outputs.release_tag }}"
          DIST_DIR="dist"
          mkdir -p "$DIST_DIR"

          BIN_NAME="alice"
          EXT=""
          if [[ "${GOOS}" == "windows" ]]; then
            EXT=".exe"
          fi

          FILE_BASE="${BIN_NAME}_${VERSION}_${GOOS}_${GOARCH}"
          BIN_FILE="${FILE_BASE}${EXT}"
          OUT_PATH="${DIST_DIR}/${BIN_FILE}"

          CGO_ENABLED=0 GOOS="${GOOS}" GOARCH="${GOARCH}" \
            go build -trimpath \
              -ldflags "-s -w -X github.com/Alice-space/alice/internal/config.defaultAliceHomeName=.alice" \
              -o "${OUT_PATH}" ./cmd/connector

          if [[ "${{ matrix.archive }}" == "zip" ]]; then
            (cd "${DIST_DIR}" && zip -q "${FILE_BASE}.zip" "${BIN_FILE}")
          else
            tar -C "${DIST_DIR}" -czf "${DIST_DIR}/${FILE_BASE}.tar.gz" "${BIN_FILE}"
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: alice-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/*.tar.gz
            dist/*.zip

  release:
    name: Create GitHub Release
    needs: [verify-and-tag, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: alice-*
          path: release-assets
          merge-multiple: true

      - name: Generate SHA256SUMS
        run: |
          set -euo pipefail
          cd release-assets
          sha256sum * > SHA256SUMS

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.verify-and-tag.outputs.release_tag }}
          generate_release_notes: true
          files: release-assets/*
