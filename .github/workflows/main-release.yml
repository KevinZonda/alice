name: Main Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  verify-and-tag:
    name: Verify Main Merge And Tag
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.next_tag.outputs.value }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep

      - name: Fetch Dev Branch
        run: git fetch --no-tags origin dev:refs/remotes/origin/dev

      - name: Enforce Main Merge Policy
        run: |
          set -euo pipefail
          parents="$(git show -s --format=%P HEAD)"
          parent_count="$(wc -w <<<"$parents" | tr -d ' ')"
          if [[ "$parent_count" -lt 2 ]]; then
            echo "main only accepts merge commits from dev." >&2
            echo "direct push is not allowed." >&2
            exit 1
          fi
          second_parent="$(awk '{print $2}' <<<"$parents")"
          if [[ -z "$second_parent" ]]; then
            echo "main merge commit does not include dev parent." >&2
            exit 1
          fi
          if ! git merge-base --is-ancestor "$second_parent" "origin/dev"; then
            echo "main merge must come from dev branch." >&2
            exit 1
          fi

      - name: Run Quality Gate
        run: make check

      - name: Compute Next Tag
        id: next_tag
        run: |
          set -euo pipefail
          latest_tag="$(git tag -l 'v*' --sort=-version:refname | head -n1)"
          merge_message="$(git log -1 --pretty=%B | tr '\n' ' ')"
          requested_tag="$(sed -nE 's/.*\[release:(v[0-9]+\.[0-9]+\.[0-9]+)\].*/\1/p' <<<"$merge_message" | head -n1)"
          if [[ -n "$requested_tag" ]]; then
            next_tag="$requested_tag"
            if [[ -n "$latest_tag" ]]; then
              if [[ "$(printf '%s\n%s\n' "$latest_tag" "$next_tag" | sort -V | tail -n1)" != "$next_tag" ]] || [[ "$latest_tag" == "$next_tag" ]]; then
                echo "requested tag ${next_tag} must be greater than latest tag ${latest_tag}" >&2
                exit 1
              fi
            fi
          elif [[ -z "$latest_tag" ]]; then
            next_tag="v0.1.0"
          else
            if [[ ! "$latest_tag" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
              echo "latest tag is not semver: $latest_tag" >&2
              exit 1
            fi
            major="${BASH_REMATCH[1]}"
            minor="${BASH_REMATCH[2]}"
            patch="${BASH_REMATCH[3]}"
            next_tag="v${major}.${minor}.$((patch + 1))"
          fi
          echo "value=$next_tag" >> "$GITHUB_OUTPUT"
          echo "next release tag: $next_tag"

      - name: Create And Push Tag
        run: |
          set -euo pipefail
          tag="${{ steps.next_tag.outputs.value }}"
          if git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
            echo "tag already exists: $tag" >&2
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$tag"
          git push origin "$tag"

  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    needs: verify-and-tag
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            archive: tar.gz
          - goos: linux
            goarch: arm64
            archive: tar.gz
          - goos: darwin
            goarch: amd64
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            archive: tar.gz
          - goos: windows
            goarch: amd64
            archive: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build Binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail
          VERSION="${{ needs.verify-and-tag.outputs.release_tag }}"
          DIST_DIR="dist"
          mkdir -p "$DIST_DIR"

          BIN_NAME="alice"
          EXT=""
          if [[ "${GOOS}" == "windows" ]]; then
            EXT=".exe"
          fi

          FILE_BASE="${BIN_NAME}_${VERSION}_${GOOS}_${GOARCH}"
          BIN_FILE="${FILE_BASE}${EXT}"
          OUT_PATH="${DIST_DIR}/${BIN_FILE}"

          CGO_ENABLED=0 GOOS="${GOOS}" GOARCH="${GOARCH}" \
            go build -trimpath \
              -ldflags "-s -w -X github.com/Alice-space/alice/internal/config.defaultAliceHomeName=.alice -X github.com/Alice-space/alice/internal/buildinfo.Version=${VERSION}" \
              -o "${OUT_PATH}" ./cmd/connector

          if [[ "${{ matrix.archive }}" == "zip" ]]; then
            (cd "${DIST_DIR}" && zip -q "${FILE_BASE}.zip" "${BIN_FILE}")
          else
            tar -C "${DIST_DIR}" -czf "${DIST_DIR}/${FILE_BASE}.tar.gz" "${BIN_FILE}"
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: alice-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/*.tar.gz
            dist/*.zip

  release:
    name: Create GitHub Release
    needs: [verify-and-tag, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download Build Artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: alice-*
          path: release-assets
          merge-multiple: true

      - name: Generate SHA256SUMS
        run: |
          set -euo pipefail
          cd release-assets
          sha256sum * > SHA256SUMS

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.verify-and-tag.outputs.release_tag }}
          generate_release_notes: true
          files: release-assets/*

  npm-publish:
    name: Publish to npm
    needs: [verify-and-tag, build, release]
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Required for npm OIDC Trusted Publishing
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Download Build Artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: alice-*
          path: release-assets
          merge-multiple: true

      - name: Publish Platform Packages
        env:
          RELEASE_TAG: ${{ needs.verify-and-tag.outputs.release_tag }}
        run: |
          set -euo pipefail
          VERSION="${RELEASE_TAG#v}"

          declare -A PLATFORM_ARTIFACTS=(
            [linux-x64]="alice_${RELEASE_TAG}_linux_amd64.tar.gz"
            [linux-arm64]="alice_${RELEASE_TAG}_linux_arm64.tar.gz"
            [darwin-x64]="alice_${RELEASE_TAG}_darwin_amd64.tar.gz"
            [darwin-arm64]="alice_${RELEASE_TAG}_darwin_arm64.tar.gz"
            [win32-x64]="alice_${RELEASE_TAG}_windows_amd64.zip"
          )

          declare -A PLATFORM_GONAMES=(
            [linux-x64]="linux_amd64"
            [linux-arm64]="linux_arm64"
            [darwin-x64]="darwin_amd64"
            [darwin-arm64]="darwin_arm64"
            [win32-x64]="windows_amd64"
          )

          for platform in linux-x64 linux-arm64 darwin-x64 darwin-arm64 win32-x64; do
            artifact="${PLATFORM_ARTIFACTS[$platform]}"
            goname="${PLATFORM_GONAMES[$platform]}"
            pkg_dir="npm/platforms/${platform}"
            bin_dir="${pkg_dir}/bin"
            mkdir -p "$bin_dir"

            if [[ "$platform" == "win32-x64" ]]; then
              unzip -o "release-assets/${artifact}" -d "$bin_dir/"
              mv "${bin_dir}/alice_${RELEASE_TAG}_${goname}.exe" "${bin_dir}/alice.exe"
            else
              tar -xzf "release-assets/${artifact}" -C "$bin_dir/"
              mv "${bin_dir}/alice_${RELEASE_TAG}_${goname}" "${bin_dir}/alice"
              chmod +x "${bin_dir}/alice"
            fi

            # Set version and publish
            jq --arg v "$VERSION" '.version = $v' "${pkg_dir}/package.json" > /tmp/pkg.json
            mv /tmp/pkg.json "${pkg_dir}/package.json"
            cd "$pkg_dir" && npm publish --provenance --access public && cd -
            echo "Published @alice_space/alice-${platform}@${VERSION}"
          done

      - name: Publish Main Package
        env:
          RELEASE_TAG: ${{ needs.verify-and-tag.outputs.release_tag }}
        run: |
          set -euo pipefail
          VERSION="${RELEASE_TAG#v}"

          # Sync version and optionalDependencies to the same version
          jq --arg v "$VERSION" '
            .version = $v |
            .optionalDependencies = (
              .optionalDependencies | to_entries | map(.value = $v) | from_entries
            )
          ' npm/main/package.json > /tmp/pkg.json
          mv /tmp/pkg.json npm/main/package.json

          chmod +x npm/main/alice.js
          cd npm/main && npm publish --provenance --access public
          echo "Published @alice_space/alice@${VERSION}"
