name: Release On Tag

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  test:
    name: Test
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep

      - name: Quality Gate
        run: make check

  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    if: github.actor != 'github-actions[bot]'
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            archive: tar.gz
          - goos: linux
            goarch: arm64
            archive: tar.gz
          - goos: darwin
            goarch: amd64
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            archive: tar.gz
          - goos: windows
            goarch: amd64
            archive: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build Binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          DIST_DIR="dist"
          mkdir -p "$DIST_DIR"

          BIN_NAME="alice"
          EXT=""
          if [[ "${GOOS}" == "windows" ]]; then
            EXT=".exe"
          fi

          FILE_BASE="${BIN_NAME}_${VERSION}_${GOOS}_${GOARCH}"
          BIN_FILE="${FILE_BASE}${EXT}"
          OUT_PATH="${DIST_DIR}/${BIN_FILE}"

          CGO_ENABLED=0 GOOS="${GOOS}" GOARCH="${GOARCH}" \
            go build -trimpath \
              -ldflags "-s -w -X github.com/Alice-space/alice/internal/config.defaultAliceHomeName=.alice" \
              -o "${OUT_PATH}" ./cmd/connector

          if [[ "${{ matrix.archive }}" == "zip" ]]; then
            (cd "${DIST_DIR}" && zip -q "${FILE_BASE}.zip" "${BIN_FILE}")
          else
            tar -C "${DIST_DIR}" -czf "${DIST_DIR}/${FILE_BASE}.tar.gz" "${BIN_FILE}"
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: alice-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/*.tar.gz
            dist/*.zip

  release:
    name: Create GitHub Release
    if: github.actor != 'github-actions[bot]'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Build Artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: alice-*
          path: release-assets
          merge-multiple: true

      - name: Generate SHA256SUMS
        run: |
          set -euo pipefail
          cd release-assets
          sha256sum * > SHA256SUMS

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-assets/*
