name: Release On Tag

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run Tests
        run: go test ./...

  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            archive: tar.gz
          - goos: linux
            goarch: arm64
            archive: tar.gz
          - goos: darwin
            goarch: amd64
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            archive: tar.gz
          - goos: windows
            goarch: amd64
            archive: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build Binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          DIST_DIR="dist"
          mkdir -p "$DIST_DIR"

          BIN_NAME="alice-connector"
          EXT=""
          if [[ "${GOOS}" == "windows" ]]; then
            EXT=".exe"
          fi

          FILE_BASE="${BIN_NAME}_${VERSION}_${GOOS}_${GOARCH}"
          BIN_FILE="${FILE_BASE}${EXT}"
          OUT_PATH="${DIST_DIR}/${BIN_FILE}"

          CGO_ENABLED=0 GOOS="${GOOS}" GOARCH="${GOARCH}" \
            go build -trimpath -ldflags "-s -w" -o "${OUT_PATH}" ./cmd/connector

          if [[ "${{ matrix.archive }}" == "zip" ]]; then
            (cd "${DIST_DIR}" && zip -q "${FILE_BASE}.zip" "${BIN_FILE}")
          else
            tar -C "${DIST_DIR}" -czf "${DIST_DIR}/${FILE_BASE}.tar.gz" "${BIN_FILE}"
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: alice-connector-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/*.tar.gz
            dist/*.zip

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: alice-connector-*
          path: release-assets
          merge-multiple: true

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-assets/*
